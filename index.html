<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CatWeb Registry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
--bg:#0b0f17;
--card:rgba(20,24,32,0.6);
--border:rgba(255,255,255,0.08);
--text:#e8ecf1;
--muted:#8b93a7;
--accent:#4ade80;
}

.light{
--bg:#f4f6fb;
--card:rgba(255,255,255,0.7);
--text:#111;
--muted:#555;
--border:rgba(0,0,0,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Inter,sans-serif;}

body{
background:radial-gradient(circle at top,#111827,var(--bg));
color:var(--text);
height:100vh;
display:flex;
overflow:hidden;
transition:0.4s;
}

/* LAYOUT */
.app{display:flex;width:100%;}

/* SIDEBAR */
.sidebar{
width:260px;
padding:24px;
background:var(--card);
backdrop-filter:blur(25px);
border-right:1px solid var(--border);
}

.logo{
font-weight:700;
font-size:18px;
color:var(--accent);
margin-bottom:30px;
}

.nav button{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid var(--border);
background:transparent;
color:var(--text);
cursor:pointer;
transition:all .25s cubic-bezier(.4,0,.2,1);
}

.nav button:hover{
background:rgba(255,255,255,0.05);
transform:translateX(6px);
}

.nav button:active{transform:scale(.96);}

/* MAIN */
.main{
flex:1;
padding:50px;
display:flex;
justify-content:center;
overflow-y:auto;
}

/* CARD */
.card{
width:100%;
max-width:640px;
padding:30px;
border-radius:18px;
background:var(--card);
backdrop-filter:blur(30px);
border:1px solid var(--border);
box-shadow:0 20px 60px rgba(0,0,0,0.4);
animation:fade .5s cubic-bezier(.4,0,.2,1);
}

/* TEXT */
.sub{color:var(--muted);margin-top:5px;font-size:14px;}

/* INPUT */
input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:1px solid var(--border);
background:rgba(0,0,0,0.3);
color:var(--text);
transition:.25s;
}

input:focus{
outline:none;
border-color:var(--accent);
box-shadow:0 0 0 3px rgba(74,222,128,.15);
}

/* BUTTON */
.btn{
margin-top:16px;
padding:14px;
width:100%;
border-radius:10px;
border:none;
background:var(--accent);
color:black;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(74,222,128,.25);
}

.btn:active{transform:scale(.97);}

/* TRADEMARK */
.tm{
margin-top:12px;
padding:16px;
border-radius:12px;
border:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.03);
transition:.25s;
}

.tm:hover{
transform:translateY(-2px);
background:rgba(255,255,255,0.06);
}

/* TAG */
.tag{
font-size:12px;
color:var(--accent);
}

/* ANIM */
@keyframes fade{
from{opacity:0;transform:translateY(15px) scale(.98);}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">CatWeb™ Registry</div>

<div class="nav">
<button onclick="go('dashboard')">Dashboard</button>
<button onclick="go('register')">Register</button>
<button onclick="go('manage')">Manage</button>
<button onclick="go('settings')">Settings</button>
<button onclick="go('legal')">Legal</button>
</div>
</div>

<div class="main">
<div id="view"></div>
</div>

</div>

<script>
let user=localStorage.getItem("cw_user");
let theme=localStorage.getItem("cw_theme")||"dark";
if(theme==="light")document.body.classList.add("light");

/* DB */
function db(){return JSON.parse(localStorage.getItem("cw_data"))||[];}
function save(d){localStorage.setItem("cw_data",JSON.stringify(d));}

/* NAV */
function go(p){
if(!user)return login();

if(p==="dashboard"){
let data=db().filter(x=>x.owner===user);

view.innerHTML=`
<div class="card">
<h2>Dashboard</h2>
<div class="sub">@${user}</div>

${data.length?data.map(t=>tmUI(t)).join(""):`<div class="sub">No trademarks yet</div>`}
</div>`;
}

/* REGISTER */
if(p==="register"){
view.innerHTML=`
<div class="card">
<h2>Register Trademark</h2>
<div class="sub">Secure your identity</div>

<input id="name" placeholder="Trademark name">
<button class="btn" onclick="register()">Register</button>

<div id="msg" class="sub"></div>
</div>`;
}

/* MANAGE */
if(p==="manage"){
let data=db().filter(x=>x.owner===user);

view.innerHTML=`
<div class="card">
<h2>Manage</h2>

${data.map((t,i)=>`
<div class="tm">
<div>
<strong>${t.name}</strong>
<div class="sub">${t.id}</div>
</div>
<button onclick="del(${i})">Delete</button>
</div>`).join("")||"None"}
</div>`;
}

/* SETTINGS */
if(p==="settings"){
view.innerHTML=`
<div class="card">
<h2>Settings</h2>

<button class="btn" onclick="toggleTheme()">Toggle Theme</button>
<button class="btn" style="background:#ef4444;color:white" onclick="logout()">Logout</button>
</div>`;
}

/* LEGAL */
if(p==="legal"){
view.innerHTML=`
<div class="card">
<h2>Legal</h2>

<h3>Terms</h3>
<p class="sub">
Trademarks for this site only apply to the CatWeb web browser and are not legally binding in any jurisdiction.
</p>

<h3 style="margin-top:15px">Privacy Policy</h3>
<p class="sub">
All data is stored locally within your browser. No personal data is transmitted, stored externally, or shared.
</p>
</div>`;
}
}

/* UI */
function tmUI(t){
return `
<div class="tm">
<div>
<strong>${t.name}</strong>
<div class="sub">${t.date}</div>
</div>
<div class="tag">CW™</div>
</div>`;
}

/* LOGIN */
function login(){
view.innerHTML=`
<div class="card">
<h2>Welcome</h2>
<div class="sub">Create your identity</div>

<input id="u" placeholder="Username">
<button class="btn" onclick="doLogin()">Continue</button>
</div>`;
}

function doLogin(){
let u=document.getElementById("u").value.trim();
if(!u)return;
localStorage.setItem("cw_user",u);
user=u;
go("dashboard");
}

/* LOGOUT */
function logout(){
localStorage.removeItem("cw_user");
user=null;
login();
}

/* REGISTER */
function register(){
let name=document.getElementById("name").value.trim();
let msg=document.getElementById("msg");

if(!name)return msg.textContent="Enter name";

let data=db();

if(data.find(t=>t.name.toLowerCase()===name.toLowerCase())){
msg.textContent="Already taken";
return;
}

data.push({
name,
owner:user,
id:"CW-"+Math.random().toString(36).slice(2,8).toUpperCase(),
date:new Date().toLocaleString()
});

save(data);

msg.style.color="var(--accent)";
msg.textContent="Registered successfully";
}

/* DELETE */
function del(i){
let data=db();
data.splice(i,1);
save(data);
go("manage");
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem("cw_theme",
document.body.classList.contains("light")?"light":"dark");
}

/* INIT */
user?go("dashboard"):login();
</script>

</body>
</html>
