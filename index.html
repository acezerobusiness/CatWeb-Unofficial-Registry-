<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CatWeb Registry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg:#0b0d12;
    --card:#151922;
    --text:#e6eaf2;
    --muted:#8b93a7;
    --accent:#4ade80;
}

.light {
    --bg:#f5f7fb;
    --card:#ffffff;
    --text:#111;
    --muted:#666;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui;}

body{
    background:var(--bg);
    color:var(--text);
    display:flex;
    height:100vh;
    transition:0.3s;
}

/* Sidebar */
.sidebar{
    width:240px;
    background:var(--card);
    border-right:1px solid #222;
    padding:20px;
}

.logo{color:var(--accent);margin-bottom:20px;font-weight:600;}

button{
    width:100%;
    padding:10px;
    margin-bottom:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:transparent;
    color:var(--text);
    transition:0.2s;
}

button:hover{background:#222;}

.main{
    flex:1;
    padding:40px;
    display:flex;
    justify-content:center;
}

/* Card */
.card{
    width:100%;
    max-width:600px;
    background:var(--card);
    padding:25px;
    border-radius:10px;
    animation:fade 0.4s ease;
}

/* Input */
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #333;
    background:transparent;
    color:var(--text);
}

/* Button main */
.btn{
    margin-top:15px;
    background:var(--accent);
    color:black;
    font-weight:bold;
}

/* Trademark */
.tm{
    border:1px solid #333;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
}

/* Animations */
@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">CatWeb Registry</div>

<button onclick="nav('dashboard')">Dashboard</button>
<button onclick="nav('register')">Register</button>
<button onclick="nav('manage')">Manage</button>
<button onclick="nav('settings')">Settings</button>
<button onclick="nav('legal')">Legal</button>
</div>

<div class="main">
<div id="view"></div>
</div>

<script>
let user=localStorage.getItem("cw_user");
let theme=localStorage.getItem("cw_theme")||"dark";

if(theme==="light") document.body.classList.add("light");

function db(){return JSON.parse(localStorage.getItem("cw_data"))||[];}
function save(d){localStorage.setItem("cw_data",JSON.stringify(d));}

/* NAV */
function nav(p){
if(!user)return login();

if(p==="dashboard"){
let data=db().filter(x=>x.owner===user);

view.innerHTML=`
<div class="card">
<h2>Dashboard</h2>
<p>@${user}</p>

${data.map(t=>`<div class="tm">${t.name}<span>™</span></div>`).join("")||"No trademarks"}

</div>`;
}

/* REGISTER */
if(p==="register"){
view.innerHTML=`
<div class="card">
<h2>Register</h2>

<input id="name" placeholder="Trademark name">
<button class="btn" onclick="reg()">Register</button>

<p id="msg"></p>
</div>`;
}

/* MANAGE */
if(p==="manage"){
let data=db().filter(x=>x.owner===user);

view.innerHTML=`
<div class="card">
<h2>Manage</h2>

${data.map((t,i)=>`
<div class="tm">
${t.name}
<button onclick="del(${i})">Delete</button>
</div>`).join("")||"None"}

</div>`;
}

/* SETTINGS */
if(p==="settings"){
view.innerHTML=`
<div class="card">
<h2>Settings</h2>

<button onclick="toggleTheme()">Toggle Theme</button>
<button onclick="logout()">Logout</button>

</div>`;
}

/* LEGAL */
if(p==="legal"){
view.innerHTML=`
<div class="card">
<h2>Legal</h2>

<h3>Terms</h3>
<p>Trademarks for this site only apply to the CatWeb web browser and are not legally binding.</p>

<h3>Privacy Policy</h3>
<p>All data is stored locally in your browser. No external servers collect or store your data.</p>

</div>`;
}
}

/* AUTH */
function login(){
view.innerHTML=`
<div class="card">
<h2>Login</h2>

<input id="u" placeholder="Username">
<button class="btn" onclick="doLogin()">Continue</button>

</div>`;
}

function doLogin(){
let u=document.getElementById("u").value.trim();
if(!u)return;
localStorage.setItem("cw_user",u);
user=u;
nav("dashboard");
}

function logout(){
localStorage.removeItem("cw_user");
user=null;
login();
}

/* REGISTER */
function reg(){
let name=document.getElementById("name").value.trim();
let msg=document.getElementById("msg");

let data=db();

if(data.find(t=>t.name.toLowerCase()===name.toLowerCase())){
msg.textContent="Taken";
return;
}

data.push({name,owner:user});
save(data);

msg.textContent="Registered";
}

/* DELETE */
function del(i){
let data=db();
data.splice(i,1);
save(data);
nav("manage");
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem("cw_theme",
document.body.classList.contains("light")?"light":"dark");
}

/* INIT */
user?nav("dashboard"):login();
</script>

</body>
</html>
